version: "3.9"

services:
  api:
    build: .
    container_name: lyftr_AI_Assignment
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data: